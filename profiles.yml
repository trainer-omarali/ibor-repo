deploy_dbt_ibor:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: io02101.central-india.azure

      # User/password auth
      user: dbt_dev1
      password: doe

      role: dbt_developer
      database: IBOR_DB
      warehouse: dbt_wh
      # in the future you should switch this schema to use a new environment variable
      # definitely switch this to your schema though
      schema: public
      threads: 4
      client_session_keep_alive: False
    prod:
      type: snowflake
      account: io02101.central-india.azure

      # User/password auth
      user: dbt_dev1
      password: doe

      role: dbt_developer
      database: IBOR_DB
      warehouse: dbt_wh
      schema: ibor_prod_schema
      threads: 4
      client_session_keep_alive: False
